version: "3.9"

services:
  # ─── MySQL Database ────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: jobdjango_db_last
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-jobdjango}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Redis (Broker cho Celery + Channel Layer) ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jobdjango_redis_last
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Django + Daphne ASGI ──────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobdjango_web_last
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME:-jobdjango}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DJANGO_SETTINGS_MODULE: job.settings
    ports:
      - "8000:8000"
#    command: daphne -b 0.0.0.0 -p 8000 job.asgi:application
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./static:/app/static
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Celery Worker ─────────────────────────────────────────────────────────
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobdjango_celery_last
    restart: unless-stopped
    command:
      - celery
      - -A
      - jobapis.worker.celery_app.celery_app
      - worker
      - --loglevel=info
      - --concurrency=2
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME:-jobdjango}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DJANGO_SETTINGS_MODULE: job.settings
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Adminer (Quản lý DB qua trình duyệt) ─────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: jobdjango_adminer_last
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db

volumes:
  mysql_data:
